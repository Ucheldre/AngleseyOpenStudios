<!DOCTYPE html>
<html lang="en">

<head>
    <title>Anglesey Open Studios</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

    <!-- Preconnect to external origins for faster resource loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

    <!-- Google Fonts (moved from CSS @import to avoid render-blocking chain) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap">

    <!-- Preload first background image so the slideshow starts instantly -->
    <link rel="preload" as="image" href="./assets/backgroundImages/ucheldre.webp">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="./assets/css/home.css">
</head>

<body>
    <div class="bg"></div>

    <div class="d-flex flex-column min-vh-100 min-vw-100">
        <div class="d-flex flex-grow-1 justify-content-center align-items-center">
            <div class="hero-card text-center animate__animated animate__fadeIn">

                <div class="hero-title-wrapper animate__animated animate__fadeInDown stagger-1">
                    <p class="hero-title" id="heroTitle">Anglesey Open Studios</p>
                </div>
                <p class="hero-year animate__animated animate__fadeIn stagger-3" id="year"></p>

                <hr class="divider animate__animated animate__fadeIn stagger-3">

                <div class="animate__animated animate__fadeInUp stagger-4">
                    <img class="hero-logo" src="./assets/logo.webp"
                         alt="Anglesey Open Studios logo"
                         onclick="window.location='map/index.html?time=' + Date.now();">
                </div>

                <hr class="divider animate__animated animate__fadeIn stagger-4">

                <div class="animate__animated animate__fadeInUp stagger-5">
                    <span class="cta-primary">Cliciwch i ddefnyddio'r map rhyngweithiol</span>
                    <span class="cta-secondary">Click to explore the interactive map</span>
                </div>

            </div>
        </div>

        <!-- Footer -->
        <div class="d-flex flex-shrink-0 justify-content-center align-items-center site-footer">
            <div class="text-center animate__animated animate__fadeIn stagger-5">
                <small>&copy; Canolfan Ucheldre Centre <span id="footerYear"></span></small>
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
<script src="assets/easy_background.js"></script>
<script>
    const y = new Date().getFullYear();
    document.title = 'Anglesey Open Studios | ' + y;
    document.getElementById('year').textContent = y;
    document.getElementById('footerYear').textContent = y;

    document.addEventListener('contextmenu', event => event.preventDefault());

    // --- Hero title text switcher (3D flip) ---
    (function () {
        const el      = document.getElementById('heroTitle');
        const texts   = ['Anglesey Open Studios', 'Stiwdios Agored Môn'];
        let idx       = 0;
        const FLIP    = 700; // ms – matches CSS transition duration

        setTimeout(() => setInterval(() => {
            const nextIdx = 1 - idx;

            // 1) flip out
            el.classList.add('flip-out');

            setTimeout(() => {
                // 2) swap text while hidden
                idx = nextIdx;
                el.textContent = texts[idx];

                // 3) stage entrance position
                el.classList.remove('flip-out');
                el.classList.add('flip-in');
                void el.offsetWidth; // force reflow

                // 4) flip in
                el.classList.remove('flip-in');
            }, FLIP);
        }, 5000), 5000);
    })();

    easy_background("body", {
        slide: [
            "assets/backgroundImages/ucheldre.webp",
            "assets/backgroundImages/20.-The-Crafty-Guillemot.webp",
			"assets/backgroundImages/27.Jenny-Armour.webp",
			"assets/backgroundImages/52.Jane-Samuel.webp",
			"assets/backgroundImages/54.-Craig-Taylor.webp"
        ],
        delay: [10000, 10000, 10000, 10000, 10000],
		transitionDuration: 2000 // Duration of the fade effect in milliseconds
    });
</script>

</html>
