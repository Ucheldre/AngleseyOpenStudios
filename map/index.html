<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="./assets/css/ol.css" type="text/css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/pages.css">
    <link rel="stylesheet" href="./assets/css/help.css">
    <link href="./assets/css/toastr.css" rel="stylesheet" />
    <title>Anglesey Arts Map</title>
</head>

<body>
    <div id="infoPage">
        <!-- Theme toggle button -->
        <button class="themeToggleBtn" onclick="toggleTheme()" aria-label="Toggle light/dark mode">
            <svg class="icon-sun" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <!-- Font size toggle button -->
        <button class="fontSizeBtn" onclick="toggleFontSizePanel()" aria-label="Change font size">
            <span class="fontSizeBtn-label">Aa</span>
        </button>
        <!-- Font size slider panel -->
        <div class="fontSizePanel" id="fontSizePanel">
            <div class="fontSizePanel-header">
                <span class="fontSizePanel-title">Aa</span>
                <span class="fontSizePanel-value" id="fontSizePanelValue">Arferol / Normal</span>
            </div>
            <input type="range" class="fontSizeSlider" id="fontSizeSlider" min="0" max="6" step="1" value="3">
            <div class="fontSizePanel-labels">
                <span>a</span>
                <span style="font-size:1.3em">A</span>
            </div>
            <button class="fontSizeConfirmBtn" id="fontSizeConfirmBtn" onclick="confirmFontSize()" aria-label="Confirm font size">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
        </div>
        <!-- Close button -->
        <button class="closeInfoPage" onclick="closeInfoPage()">&#x2715;</button>
        <div id="infoPageContent"></div>
    </div>
    <div id="hideMap"></div>
    <div id="map" class="map"></div>
    <script src="./assets/js/ol.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="./assets/js/toastr.js" defer></script>
    <script src="./assets/js/main.js" defer></script>
</body>

</html>
